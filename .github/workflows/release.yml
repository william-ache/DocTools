name: "DocTools Multi-Platform Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: "Desktop Build (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, flex, openssl, gd, bcmath, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Dependencies
        run: |
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Build NativePHP
        run: php artisan native:build ${{ matrix.os == 'windows-latest' && 'win' || 'mac' }}
        env:
          APP_ENV: production

      - name: Organize Tools
        run: php artisan app:compile-all

      - name: Upload Desktop Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            public/downloads/windows/*.exe
            public/downloads/mac/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: "Android APK Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Web App
        run: |
          # Aquí podrías poner tu comando de build web si usas Vite/React
          npm run build || true 

      - name: Capacitor Sync & Build
        run: |
          npx cap add android || true
          npx cap sync
          cd android && ./gradlew assembleRelease

      - name: Upload Android APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
